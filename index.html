<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore - Hệ thống bán lẻ Di động, Laptop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/home.css">
</head>
<body class="retina-ready">

<div class="overlay" id="page-overlay"></div>

<header class="header-wrapper">
    <div class="top-bar">
        <div class="container top-bar-content">
            <div class="top-left-marquee">
                <i class="fas fa-bullhorn"></i>
                <marquee behavior="scroll" direction="left" scrollamount="5">
                    🔥 iPhone 15 Pro Max giảm ngay 2 triệu đồng - Thu cũ đổi mới trợ giá đến 3 triệu - Trả góp 0% lãi suất 🔥
                </marquee>
            </div>
            <div class="top-right-links">
                <a href="#"><i class="fas fa-newspaper"></i> Bản tin</a>
                <a href="#"><i class="fas fa-store"></i> Cửa hàng</a>
                <a href="#"><i class="fas fa-truck"></i> Tra cứu</a>
                <a href="#"><i class="fas fa-user-shield"></i> Smember</a>
            </div>
        </div>
    </div>

    <div class="header">
        <div class="container header-content">
            <div class="logo">
                <h2 onclick="location.href='index.html'" style="cursor:pointer">TechStore</h2>
            </div>
            <button class="btn-header"><i class="fas fa-bars"></i><span>Danh mục</span></button>
            <div class="search-wrapper">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Bạn muốn mua gì hôm nay?">
                </div>
            </div>
            <div class="header-right">
                <div class="action-item"><i class="fas fa-phone-alt"></i><span>1800.2097</span></div>
                <a href="#" class="cart-btn action-item">
                    <i class="fa-solid fa-cart-shopping"></i><span class="badge">0</span><span>Giỏ hàng</span>
                </a>
            </div>
        </div>
    </div>
</header>

<main class="main-content">
    <section class="hero-section container">
        <aside class="sidebar-menu">
            <ul>
                <li><a href="javascript:void(0)" onclick="filterByCategory('phone')"><i class="fas fa-mobile-alt"></i><span>Điện thoại</span></a></li>
                <li><a href="javascript:void(0)" onclick="filterByCategory('laptop')"><i class="fas fa-laptop"></i><span>Laptop</span></a></li>
                <li><a href="javascript:void(0)" onclick="filterByCategory('audio')"><i class="fas fa-headphones"></i><span>Âm thanh</span></a></li>
                <li><a href="javascript:void(0)" onclick="filterByCategory('accessory')"><i class="fas fa-plug"></i><span>Phụ kiện</span></a></li>
                <li><a href="javascript:void(0)" onclick="filterByCategory('all')"><i class="fas fa-border-all"></i><span>Tất cả</span></a></li>
            </ul>
        </aside>
        <div class="hero-center">
            <div class="slider-container" style="border-radius: 12px; overflow: hidden;">
                <img src="https://github.com/ntson2001186823-ctrl/WebBanHang/blob/main/images/banner-chinh.jpg?raw=true" style="width: 100%;" alt="Banner">
            </div>
        </div>
    </section>

    <section class="flash-sale container" id="flash-sale-section">
        <div class="fs-header"><h2><i class="fas fa-bolt"></i> FLASH SALE</h2></div>
        <div class="product-list" id="fs-product-list"></div>
    </section>

    <section class="product-box container">
        <div class="box-header">
            <h2 class="box-title" id="main-title">SẢN PHẨM NỔI BẬT</h2>
        </div>
        <div class="product-grid" id="main-product-list" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px;">
            </div>
    </section>
</main>

<script>
// 1. Dữ liệu gộp tất cả sản phẩm
const products = [
    { id: 1, name: "ASUS ROG Gaming", category: "laptop", price: 20000000, img: "https://github.com/ntson2001186823-ctrl/WebBanHang/blob/main/images/banner2.png?raw=true", isFlashSale: true },
    { id: 2, name: "iPhone 17 Pro Max", category: "phone", price: 25000000, img: "https://github.com/ntson2001186823-ctrl/WebBanHang/blob/main/images/banner3.png?raw=true", isFlashSale: true },
    { id: 3, name: "Sony WH-1000XM5", category: "audio", price: 6500000, img: "https://github.com/ntson2001186823-ctrl/WebBanHang/blob/main/images/headphone.png?raw=true", isFlashSale: false },
    { id: 4, name: "Logitech G Pro", category: "accessory", price: 2500000, img: "https://github.com/ntson2001186823-ctrl/WebBanHang/blob/main/images/mouse.png?raw=true", isFlashSale: false },
    { id: 5, name: "Macbook Pro M3", category: "laptop", price: 39990000, img: "https://github.com/ntson2001186823-ctrl/WebBanHang/blob/main/images/banner2.png?raw=true", isFlashSale: false },
    { id: 6, name: "Samsung S24 Ultra", category: "phone", price: 29990000, img: "https://res.vdo.vn/Content/Upload/News/dinh-chinh-thong-tin-galaxy-s24-ultra-co-the-thieu-camera-zoom-quang-10x-230915101445-8fa2656eb8576.jpg", isFlashSale: true },
    { id: 7, name: "Camera Canon R50", category: "accessory", price: 18900000, img: "https://github.com/ntson2001186823-ctrl/WebBanHang/blob/main/images/banner2.png?raw=true", isFlashSale: false },
    { id: 8, name: "Apple AirPods 4", category: "audio", price: 3490000, img: "https://github.com/ntson2001186823-ctrl/WebBanHang/blob/main/images/headphone.png?raw=true", isFlashSale: true },
    { id: 9, name: "Bàn phím cơ Akko", category: "accessory", price: 1550000, img: "https://github.com/ntson2001186823-ctrl/WebBanHang/blob/main/images/mouse.png?raw=true", isFlashSale: false },
    { id: 10, name: "Thẻ nhớ 128GB", category: "accessory", price: 450000, img: "https://github.com/ntson2001186823-ctrl/WebBanHang/blob/main/images/mouse.png?raw=true", isFlashSale: false },
    { id: 11, name: "Gimbal DJI RS 3", category: "accessory", price: 6990000, img: "https://github.com/ntson2001186823-ctrl/WebBanHang/blob/main/images/banner2.png?raw=true", isFlashSale: true }
    
];

// 2. Hàm hiển thị
function render(filter = 'all') {
    const mainList = document.getElementById('main-product-list');
    const fsList = document.getElementById('fs-product-list');
    const fsSection = document.getElementById('flash-sale-section');
    
    mainList.innerHTML = "";
    if(fsList) fsList.innerHTML = "";

    // Ẩn Flash Sale nếu đang lọc danh mục cụ thể
    fsSection.style.display = (filter === 'all') ? "block" : "none";

    products.forEach(p => {
        if (filter !== 'all' && p.category !== filter) return;

        const html = `
            <div class="product-card" onclick="viewDetail(${p.id})" style="border: 1px solid #eee; padding: 10px; border-radius: 8px; cursor: pointer;">
                <img src="${p.img}" style="width:100%">
                <h3 style="font-size:14px; margin:10px 0;">${p.name}</h3>
                <p style="color:red; font-weight:bold;">${p.price.toLocaleString()}đ</p>
            </div>
        `;

        if (p.isFlashSale && filter === 'all' && fsList) {
            fsList.innerHTML += html;
        } else {
            mainList.innerHTML += html;
        }
    });
}

function filterByCategory(cat) {
    document.getElementById('main-title').innerText = cat === 'all' ? "SẢN PHẨM NỔI BẬT" : "DANH MỤC: " + cat.toUpperCase();
    render(cat);
}

function viewDetail(id) {
    localStorage.setItem("productId", id);
    window.location.href = "detail.html";
}

document.addEventListener('DOMContentLoaded', () => render('all'));
</script>

</body>
</html>
