<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - TechStore</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/cart.css"> 
</head>
<body class="retina-ready">

    <div class="overlay" id="page-overlay"></div>

    <header class="header-wrapper">
        <div class="header">
            <div class="container header-content"> 
                <div class="logo">
                    <h2 onclick="location.href='index.html'" style="cursor:pointer">TechStore</h2>
                </div>
                
                <div class="search-wrapper">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Bạn muốn mua gì hôm nay?">
                    </div>
                </div>

                <div class="header-right">
                    <div class="action-item" onclick="location.href='tel:18002097'">
                        <i class="fas fa-phone-alt"></i>
                        <span>1800.2097</span>
                    </div>
                    <a href="cart.html" class="cart-btn action-item">
                        <div class="cart-icon-wrapper">
                            <i class="fa-solid fa-cart-shopping"></i>
                            <span class="badge">0</span>
                        </div>
                        <span>Giỏ hàng</span>
                    </a>
                    <div class="action-item">
                        <i class="fas fa-user-circle"></i>
                        <span>Đăng nhập</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container cart-layout">
        <section class="cart-items-section">
            <h2 class="section-title" style="margin-bottom: 25px; font-weight: 800;">GIỎ HÀNG CỦA BẠN</h2> 
            
            <table class="cart-table" id="cart-table">
                <thead>
                    <tr>
                        <th>Sản phẩm</th>
                        <th>Chi tiết</th> 
                        <th>Đơn giá</th>
                        <th>Số lượng</th>
                        <th>Thành tiền</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="cart-body">
                    </tbody>
            </table>

            <div id="empty-cart-msg" class="empty-cart hidden">
                <div class="empty-content" style="text-align: center; padding: 50px;">
                    <i class="fa-solid fa-cart-plus" style="font-size: 50px; color: #ddd; margin-bottom: 20px;"></i>
                    <p style="color: #666; margin-bottom: 20px;">Giỏ hàng của bạn đang trống.</p>
                    <a href="index.html" class="btn-link" style="color: var(--main-color); font-weight: 700; text-decoration: none; border: 2px solid var(--main-color); padding: 10px 25px; border-radius: 8px;">TIẾP TỤC MUA SẮM →</a>
                </div>
            </div>
        </section>

        <aside class="cart-sidebar">
            <div class="summary-box">
                <h2 style="font-size: 18px; margin-bottom: 20px;">Tóm tắt đơn hàng</h2>
                <div class="summary-row">
                    <span>Tạm tính</span>
                    <span id="subtotal" style="font-weight: 600;">0đ</span>
                </div>
                <div class="summary-row">
                    <span>Phí vận chuyển</span>
                    <span style="font-weight: 600;">30.000đ</span>
                </div>
                
                <div class="summary-row total-row" style="border-top: 1px dashed #eee; padding-top: 15px; margin-top: 15px;">
                    <span style="font-size: 16px; color: #333;">Tổng cộng</span>
                    <span id="final-total" style="color: var(--main-color); font-size: 22px; font-weight: 900;">0đ</span>
                </div>
                
                <button id="checkout-btn" class="checkout-btn" style="margin-top: 25px;">THANH TOÁN NGAY</button>
                
                <p class="note" style="font-size: 11px; color: #999; margin-top: 15px; text-align: center;">
                    * Giá đã bao gồm thuế VAT (nếu có)
                </p>
            </div>
        </aside>
    </main>


    <script src="js/storage.js"></script>
    <script src="js/cart-logic.js"></script>
</body>
</html>
