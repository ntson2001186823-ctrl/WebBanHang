<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - TechStore</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/cart.css"> 
</head>
<body>

    <header class="header">
        <div class="container header-content">
            <div class="logo">
                <h2>Tech<span>Store</span></h2>
            </div>

            <nav class="menu">
                <ul>
                    <li><a href="index.html">Trang chủ</a></li>
                    <li><a href="#">Sản phẩm</a></li>
                    <li><a href="#">Laptop</a></li>
                    <li><a href="#">Điện thoại</a></li>
                    <li><a href="#">Liên hệ</a></li>
                </ul>
            </nav>

            <div class="header-right">
                <div class="search-box">
                    <input type="text" placeholder="Tìm sản phẩm...">
                    <button>Tìm kiếm</button>
                </div>
                <a href="cart.html" class="cart-btn">🛒 Giỏ hàng</a>
            </div>
        </div>
    </header>

    <main class="container cart-layout">
    <section class="cart-items-section">
        <h2 class="cart-title">Giỏ hàng</h2> <table class="cart-table">
            <thead>
                <tr>
                    <th>Sản phẩm</th>
                    <th>Chi tiết</th> <th>Đơn giá</th>
                    <th>Số lượng</th>
                    <th>Thành tiền</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="cart-body">
                </tbody>
        </table>

        <div id="empty-cart-msg" class="empty-cart hidden">
            <div class="empty-content">
                <p>Giỏ hàng của bạn đang trống.</p>
                <a href="index.html" class="btn-link">Tiếp tục mua sắm →</a>
            </div>
        </div>
    </section>

    <aside class="cart-sidebar">
        <div class="summary-box">
            <h2>Tóm tắt đơn hàng</h2>
            <div class="summary-row">
                <span>Tạm tính</span>
                <span id="subtotal">0đ</span>
            </div>
            <div class="summary-row">
                <span>Phí vận chuyển</span>
                <span>30.000đ</span>
            </div>
            
            <div class="summary-row total-row">
                <span>Tổng cộng</span>
                <span id="final-total">0đ</span>
            </div>
            
            <button id="checkout-btn" class="checkout-btn">THANH TOÁN NGAY</button>
            
            <div class="payment-methods">
                <p class="note">* Giá đã bao gồm thuế VAT (nếu có)</p>
            </div>
        </div>
    </aside>
</main>


    <script src="js/storage.js"></script>
    <script src="js/cart-logic.js"></script>
</body>
</html>
