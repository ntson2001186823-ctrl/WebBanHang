<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán | TechStore</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/checkout.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <header class="checkout-header">
        <div class="container">
            <a href="index.html" class="logo">Tech Store</a>
            <span class="secure-checkout">🔒 Thanh toán bảo mật</span>
        </div>
    </header>

    <main class="checkout-layout">
        
        <section class="checkout-form-section">
            <div class="back-to-cart">
                <a href="cart.html">&larr; Quay lại giỏ hàng</a>
            </div>
            
            <h2 class="section-title">Thông tin thanh toán</h2>
            
            <form id="checkout-form">
                <div class="form-group">
                    <label for="fullname">Họ và tên</label>
                    <input type="text" id="fullname" required placeholder="Nhập họ và tên của bạn">
                </div>

                <div class="form-row split">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" required placeholder="Email nhận hóa đơn và thông báo đơn hàng">
                    </div>
                    <div class="form-group">
                        <label for="phone">Số điện thoại</label>
                        <input type="tel" id="phone" required placeholder="Số điện thoại liên hệ">
                    </div>
                </div>

                <div class="form-group">
                    <label>Phương thức thanh toán</label>
                    <div class="payment-methods">
                        <label class="radio-container">
                            <input type="radio" name="payment" value="banking" checked>
                            <span class="checkmark"></span>
                            Chuyển khoản ngân hàng (VietQR)
                        </label>
                        <label class="radio-container">
                            <input type="radio" name="payment" value="momo">
                            <span class="checkmark"></span>
                            Ví điện tử MoMo
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn-confirm">XÁC NHẬN ĐẶT HÀNG</button>
            </form>
        </section>

        <aside class="checkout-sidebar">
            <h3 class="sidebar-title">Đơn hàng của bạn</h3>
            <div id="checkout-items" class="checkout-items">
                </div>
            
            <div class="checkout-summary">
                <div class="summary-line">
                    <span>Tạm tính</span>
                    <span id="checkout-subtotal">0đ</span>
                </div>
                <div class="summary-line total-line">
                    <span>Tổng cộng</span>
                    <span id="checkout-total">0đ</span>
                </div>
            </div>
        </aside>

    </main>

    <div id="payment-modal" class="modal hidden">
        <div class="modal-content">
            <h3 class="section-title" style="margin-bottom: 10px; border: none;">Quét mã để thanh toán</h3>
            <p style="color: #64748b; margin-bottom: 20px;">Vui lòng quét mã QR dưới đây để hoàn tất đơn hàng</p>
            
            <div id="qr-container">
                <img id="qr-image" src="" alt="Mã QR Thanh toán">
            </div>

            <div class="payment-info">
                <p>Số tiền: <span id="pay-amount">0đ</span></p>
                <p>Nội dung: <span id="pay-content"></span></p>
            </div>

            <button id="confirm-paid-btn" class="btn-confirm">TÔI ĐÃ CHUYỂN KHOẢN</button>
            <button id="close-modal" class="btn-link">Hủy giao dịch</button>
        </div>
    </div>  

    <script src="js/storage.js"></script>
    <script src="js/checkout.js"></script>
</body>
</html>
